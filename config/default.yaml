# QSNE default hyperparameters.
# Matches Table 'QSNE hyperparameters' in Section 2 of the paper.

ppo:
  total_steps: 100000
  learning_rate: 0.0003
  batch_size: 64
  num_epochs: 10
  clip_eps: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  scan_recon_coef: 0.1
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5
  rollout_steps: 2048

lstm:
  hidden_units: 128
  fc_width: 64
  action_dim: 2

action_clip:
  v_min: 0.0
  v_max: 2.0
  omega_min: -1.0
  omega_max: 1.0

pqc:
  num_qubits: 6
  num_layers: 4
  rotation_gates: ["RX", "RY"]
  entangling_gate: "CNOT"
  measurement: "PauliZ"

llm:
  model_snapshot: "gpt-4o-2024-08-06"
  temperature: 0.2
  max_tokens: 96
  embed_dim: 256
  query_interval: 10
  variance_threshold: 2.0
  timeout_s: 3.0
  encoder: "distilbert-base-uncased"

degradation:
  p_drop: 0.5
  p_noise: 0.5
  sigma: 2.0  # meters

reward:
  goal_radius: 0.5
  goal_reward: 10.0
  collision_penalty: -10.0
  step_cost: -0.01
  no_progress_penalty: -0.5
  safety_distance: 0.35

environment:
  num_rays: 720
  max_range: 30.0
  horizon: 1500
  control_rate_hz: 10
